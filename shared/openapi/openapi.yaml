      summary: Update group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteGroup
      tags: [Groups]
      summary: Delete group
      responses:
        "204":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/groups/{id}/members:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      operationId: listGroupMembers
      tags: [Groups]
      summary: List group members
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: addGroupMember
      tags: [Groups]
      summary: Add member to group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupMemberAdd"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupMember"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/groups/{id}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/PathId"
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      operationId: removeGroupMember
      tags: [Groups]
      summary: Remove member from group
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Organizational Units
  # ---------------------------------------------------------------------------
  /api/org-units:
    get:
      operationId: listOrgUnits
      tags: [OrgUnits]
      summary: List organizational units (tree structure)
      responses:
        "200":
          description: OU tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrgUnit"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createOrgUnit
      tags: [OrgUnits]
      summary: Create organizational unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgUnitCreate"
      responses:
        "201":
          description: OU created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUnit"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/org-units/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    put:
      operationId: updateOrgUnit
      tags: [OrgUnits]
      summary: Update organizational unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrgUnitUpdate"
      responses:
        "200":
          description: OU updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgUnit"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteOrgUnit
      tags: [OrgUnits]
      summary: Delete organizational unit
      responses:
        "204":
          description: OU deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot delete OU with children or assigned users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ---------------------------------------------------------------------------
  # Reports
  # ---------------------------------------------------------------------------
  /api/reports:
    get:
      operationId: listReports
      tags: [Reports]
      summary: List reports (paginated)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/SortByParam"
        - $ref: "#/components/parameters/SortDirParam"
        - name: folderId
          in: query
          schema:
            type: integer
            format: int64
          description: Filter by folder
      responses:
        "200":
          description: Paginated list of reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createReport
      tags: [Reports]
      summary: Create a new report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCreate"
      responses:
        "201":
          description: Report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/reports/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      operationId: getReport
      tags: [Reports]
      summary: Get report by ID
      responses:
        "200":
          description: Report details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateReport
      tags: [Reports]
      summary: Update report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportUpdate"
      responses:
        "200":
          description: Report updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
        "400":
