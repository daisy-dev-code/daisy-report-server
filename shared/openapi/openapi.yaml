  /api/reports/{id}/execute:
    parameters:
      - $ref: "#/components/parameters/PathId"
    post:
      operationId: executeReport
      tags: [Reports]
      summary: Execute report and return data or file
      description: >
        Executes the report query against its datasource. For JSON output the
        response body is a ReportExecuteResponseJson object. For CSV, XLSX, or
        PDF output the response is the binary file with an appropriate
        Content-Type header.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportExecuteRequest"
      responses:
        "200":
          description: Report results (JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportExecuteResponseJson"
            text/csv:
              schema:
                type: string
                format: binary
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "500":
          $ref: "#/components/responses/InternalServerError"

