      summary: Add an access control entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ACECreate"
      responses:
        "201":
          description: ACE created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ACE"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/permissions/ace/{aceId}:
    parameters:
      - name: aceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      operationId: removeAce
      tags: [Permissions]
      summary: Remove an access control entry
      responses:
        "204":
          description: ACE removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # System
  # ---------------------------------------------------------------------------
  /api/system/health:
    get:
      operationId: healthCheck
      tags: [System]
      summary: Health check (no authentication required)
      security: []
      responses:
        "200":
          description: System health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: System unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/system/info:
    get:
      operationId: systemInfo
      tags: [System]
      summary: Get system info (version, uptime)
      responses:
        "200":
          description: System information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/system/config:
    get:
      operationId: getSystemConfig
      tags: [System]
      summary: Get system configuration (admin only)
      responses:
        "200":
          description: System configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    put:
      operationId: updateSystemConfig
      tags: [System]
      summary: Update system configuration (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemConfig"
      responses:
        "200":
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
